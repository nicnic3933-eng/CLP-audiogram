<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Audiogram Plotter</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .app-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.15); width: fit-content; }
        .input-wrapper { display: flex; gap: 30px; margin-bottom: 20px; }
        h3 { margin: 0 0 10px 0; font-size: 1.1rem; text-align: center; }
        .red-text { color: #d32f2f; }
        .blue-text { color: #1976d2; }
        table { border-collapse: collapse; background: #fff; }
        th, td { border: 1px solid #dee2e6; padding: 4px 8px; text-align: center; }
        th { background: #f8f9fa; font-size: 0.8rem; font-weight: 600; }
        input { width: 55px; padding: 6px; text-align: center; border: 1px solid #ccc; border-radius: 4px; font-weight: bold; }
        input:focus { border-color: #007bff; outline: none; background: #f0f7ff; }
        input:disabled { background: #f1f1f1; cursor: not-allowed; border-color: #eee; }
        .canvas-container { position: relative; border: 2px solid #333; line-height: 0; }
        canvas { background: #fff; max-width: 100%; height: auto; }
        .toolbar { margin-top: 15px; display: flex; gap: 10px; justify-content: center; }
        button { padding: 10px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-save { background: #28a745; color: white; }
        .btn-reset { background: #6c757d; color: white; }
        button:hover { opacity: 0.9; }
        .instructions { font-size: 0.85rem; color: #555; margin-top: 15px; background: #e9ecef; padding: 10px; border-radius: 6px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="input-wrapper">
        <div>
            <h3 class="red-text">RIGHT EAR (O / &lt;)</h3>
            <table id="rightGrid">
                <thead><tr><th>Hz</th><th>AC</th><th>BC</th></tr></thead>
                <tbody id="rightBody"></tbody>
            </table>
        </div>

        <div>
            <h3 class="blue-text">LEFT EAR (X / &gt;)</h3>
            <table id="leftGrid">
                <thead><tr><th>Hz</th><th>AC</th><th>BC</th></tr></thead>
                <tbody id="leftBody"></tbody>
            </table>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="audioCanvas" width="1024" height="600"></canvas>
    </div>

    <div class="instructions">
        <strong>Shortcut Rules:</strong> Type <b>"m"</b> for Masked (e.g., 20m) • Type <b>"n"</b> for No Response (e.g., 40n) • Type <b>"mn"</b> for Masked NR.
    </div>

    <div class="toolbar">
        <button class="btn-save" onclick="downloadImage()">Download PNG Report</button>
        <button class="btn-reset" onclick="location.reload()">Clear All Data</button>
    </div>
</div>

const canvas = document.getElementById('audioCanvas');
const ctx = canvas.getContext('2d');
const freqs = [250, 500, 1000, 2000, 3000, 4000, 6000, 8000];
const bcAllowed = [500, 1000, 2000, 4000];

// --- CALIBRATION ADJUSTMENT ---
// If symbols are still slightly off, change these numbers by 1 or 2 pixels
const CAL = {
    R_X_START: 130,   // Starting X for Right 250Hz
    L_X_START: 635,   // Starting X for Left 250Hz
    X_STEP: 53.8,     // Horizontal distance between freq lines
    Y_ZERO: 75,       // Vertical pixel for 0 dB
    Y_STEP_10: 38.8   // Vertical pixels for every 10 dB
};

const bgImage = new Image();
bgImage.src = 'template.png'; 

bgImage.onload = () => {
    // This prevents the "squeezing" by forcing the canvas 
    // to be the exact size of your original image file.
    canvas.width = bgImage.naturalWidth;
    canvas.height = bgImage.naturalHeight;
    drawAll();
};

function drawAll() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Draw the background image at its natural size
    if (bgImage.complete) {
        ctx.drawImage(bgImage, 0, 0);
    }

    const allInputs = Array.from(document.querySelectorAll('.in')).filter(i => i.value);

    // 1. Draw AC Lines
    ['RAC', 'LAC'].forEach(type => {
        const color = type.startsWith('R') ? 'red' : 'blue';
        const points = allInputs
            .filter(i => i.dataset.t === type && !i.value.toLowerCase().includes('n'))
            .map(i => ({...getCoords(type, i.dataset.f, i.value), f: parseInt(i.dataset.f)}))
            .sort((a, b) => a.f - b.f);

        if (points.length > 1) {
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = 3; // Thicker lines for professional look
            ctx.moveTo(points[0].x, points[0].y);
            points.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.stroke();
        }
    });

    // 2. Draw Symbols
    allInputs.forEach(i => {
        const val = i.value.toLowerCase();
        const db = parseFloat(val);
        if (isNaN(db)) return;
        const pos = getCoords(i.dataset.t, i.dataset.f, val);
        renderSymbol(i.dataset.t, pos, val);
    });
}

function getCoords(type, freq, val) {
    const fIdx = freqs.indexOf(parseInt(freq));
    const isLeft = type.startsWith('L');
    const startX = isLeft ? CAL.L_X_START : CAL.R_X_START;
    return {
        x: startX + (fIdx * CAL.X_STEP),
        y: CAL.Y_ZERO + (parseFloat(val) * (CAL.Y_STEP_10 / 10))
    };
}

    </html>
