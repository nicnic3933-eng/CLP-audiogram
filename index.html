<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audiogram Creator Pro (Updated NR)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .app-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.15); width: fit-content; }
        .input-wrapper { display: flex; gap: 30px; margin-bottom: 20px; }
        h3 { margin: 0 0 10px 0; font-size: 1.1rem; text-align: center; }
        .red-text { color: #d32f2f; }
        .blue-text { color: #1976d2; }
        table { border-collapse: collapse; background: #fff; }
        th, td { border: 1px solid #dee2e6; padding: 4px 8px; text-align: center; }
        th { background: #f8f9fa; font-size: 0.8rem; font-weight: 600; }
        input { width: 55px; padding: 6px; text-align: center; border: 1px solid #ccc; border-radius: 4px; font-weight: bold; }
        input:focus { border-color: #007bff; outline: none; background: #f0f7ff; }
        input:disabled { background: #f1f1f1; cursor: not-allowed; border-color: #eee; }
        .canvas-container { position: relative; border: 2px solid #333; line-height: 0; overflow: auto; max-width: 95vw; }
        canvas { background: #fff; display: block; }
        .toolbar { margin-top: 15px; display: flex; gap: 10px; justify-content: center; }
        button { padding: 10px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s;}
        .btn-save { background: #28a745; color: white; }
        .btn-save:hover { background: #218838; }
        .btn-reset { background: #6c757d; color: white; }
        .btn-reset:hover { background: #5a6268; }
        .instructions { font-size: 0.85rem; color: #555; margin-top: 15px; background: #e9ecef; padding: 10px; border-radius: 6px; text-align: center; max-width: 600px;}
    </style>
</head>
<body>

<div class="app-container">
    <div class="input-wrapper">
        <div>
            <h3 class="red-text">RIGHT EAR</h3>
            <table id="rightGrid">
                <thead><tr><th>Hz</th><th>AC</th><th>BC</th></tr></thead>
                <tbody id="rightBody"></tbody>
            </table>
        </div>

        <div>
            <h3 class="blue-text">LEFT EAR</h3>
            <table id="leftGrid">
                <thead><tr><th>Hz</th><th>AC</th><th>BC</th></tr></thead>
                <tbody id="leftBody"></tbody>
            </table>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="audioCanvas"></canvas>
    </div>

    <div class="instructions">
        <strong>Shortcut Rules:</strong> [Number] = Unmasked • [Number]<b>m</b> = Masked • [Number]<b>n</b> = NR (Arrow) • [Number]<b>mn</b> = Masked NR.
        <br>BC limited to 500-4000 Hz. AC connected; NR symbols are skipped by lines.
    </div>

    <div class="toolbar">
        <button class="btn-save" onclick="downloadImage()">Download PNG Report</button>
        <button class="btn-reset" onclick="location.reload()">Clear All Data</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('audioCanvas');
    const ctx = canvas.getContext('2d');

    const freqs = [250, 500, 1000, 2000, 3000, 4000, 6000, 8000];
    const bcAllowed = [500, 1000, 2000, 4000];

    const CAL = {
        R_X_START: 132,   // X-pixel for Right 250Hz
        L_X_START: 635,   // X-pixel for Left 250Hz
        X_STEP: 53.6,     // Pixels between freq lines
        Y_ZERO: 72,       // Y-pixel for 0 dB
        Y_STEP_10: 38.6   // Y-pixels for every 10 dB
    };

    const bgImage = new Image();
    bgImage.src = 'template.png'; 
    
    bgImage.onload = () => {
        canvas.width = bgImage.naturalWidth;
        canvas.height = bgImage.naturalHeight;
        drawAll();
    };

    function initGrids() {
        const sides = { 'R': 'rightBody', 'L': 'leftBody' };
        for (let side in sides) {
            const tbody = document.getElementById(sides[side]);
            freqs.forEach(f => {
                const tr = document.createElement('tr');
                const bcDisabled = !bcAllowed.includes(f);
                tr.innerHTML = `
                    <td><strong>${f}</strong></td>
                    <td><input type="text" data-f="${f}" data-t="${side}AC" class="in"></td>
                    <td><input type="text" data-f="${f}" data-t="${side}BC" class="in" ${bcDisabled ? 'disabled' : ''}></td>
                `;
                tbody.appendChild(tr);
            });
        }
    }

    initGrids();
    document.querySelectorAll('.in').forEach(i => i.addEventListener('input', drawAll));

    function getCoords(type, freq, val) {
        const fIdx = freqs.indexOf(parseInt(freq));
        const isLeft = type.startsWith('L');
        const startX = isLeft ? CAL.L_X_START : CAL.R_X_START;
        return {
            x: startX + (fIdx * CAL.X_STEP),
            y: CAL.Y_ZERO + (parseFloat(val) * (CAL.Y_STEP_10 / 10))
        };
    }

    function drawAll() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (bgImage.complete) ctx.drawImage(bgImage, 0, 0);

        const allInputs = Array.from(document.querySelectorAll('.in')).filter(i => i.value);

        // AC Connecting Lines (Skip NR)
        ['RAC', 'LAC'].forEach(type => {
            const color = type.startsWith('R') ? 'red' : 'blue';
            const points = allInputs
                .filter(i => i.dataset.t === type && !i.value.toLowerCase().includes('n'))
                .map(i => ({...getCoords(type, i.dataset.f, i.value), f: parseInt(i.dataset.f)}))
                .sort((a, b) => a.f - b.f);

            if (points.length > 1) {
                ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 3; ctx.lineJoin = "round";
                ctx.moveTo(points[0].x, points[0].y);
                points.forEach(p => ctx.lineTo(p.x, p.y));
                ctx.stroke();
            }
        });

        // Individual Symbols
        allInputs.forEach(i => {
            const val = i.value.toLowerCase();
            const db = parseFloat(val);
            if (isNaN(db)) return;
            const pos = getCoords(i.dataset.t, i.dataset.f, val);
            renderSymbol(i.dataset.t, pos, val);
        });
    }

    function renderSymbol(type, pos, val) {
        const {x, y} = pos;
        const isM = val.includes('m'), isN = val.includes('n');
        ctx.strokeStyle = type.startsWith('R') ? 'red' : 'blue';
        ctx.fillStyle = type.startsWith('R') ? 'red' : 'blue'; // Some arrows use fill
        ctx.lineWidth = 3; ctx.lineCap = "round";
        ctx.beginPath();

        if (type === 'RAC') {
            isM ? (ctx.moveTo(x,y-9), ctx.lineTo(x-9,y+7), ctx.lineTo(x+9,y+7), ctx.closePath(), ctx.stroke()) 
                : (ctx.arc(x,y,8,0,Math.PI*2), ctx.stroke());
        } else if (type === 'LAC') {
            isM ? (ctx.rect(x-8,y-8,16,16), ctx.stroke()) 
                : (ctx.moveTo(x-8,y-8), ctx.lineTo(x+8,y+8), ctx.moveTo(x+8,y-8), ctx.lineTo(x-8,y+8), ctx.stroke());
        } else if (type === 'RBC') {
            // New [ ] bracket dimensions
            isM ? (ctx.moveTo(x+9,y-9), ctx.lineTo(x,y-9), ctx.lineTo(x,y+9), ctx.lineTo(x+9,y+9), ctx.stroke()) 
                : (ctx.moveTo(x+9,y-9), ctx.lineTo(x,y), ctx.lineTo(x+9,y+9), ctx.stroke());
        } else if (type === 'LBC') {
            isM ? (ctx.moveTo(x-9,y-9), ctx.lineTo(x,y-9), ctx.lineTo(x,y+9), ctx.lineTo(x-9,y+9), ctx.stroke()) 
                : (ctx.moveTo(x-9,y-9), ctx.lineTo(x,y), ctx.lineTo(x-9,y+9), ctx.stroke());
        }

        if (isN) {
            ctx.stroke(); // Finish base symbol stroke first
            drawNRArrow(ctx, x, y, type);
        }
    }

    // DRAWING NEW NR ARROWS BASED ON PROVIDED IMAGE
    function drawNRArrow(ctx, x, y, type) {
        const side = type.startsWith('R') ? 'R' : 'L';
        const con = type.endsWith('C') ? 'C' : ''; // Just handling AC/BC based on type name
        // (Assuming you'll adjust this function based on whether 'con' is AC or BC)
        
        ctx.lineWidth = 2.5; ctx.beginPath(); ctx.setLineDash([]); // Reset dash for arrows

        if (type === 'RAC') {
            // UNMASKED: AC R (Circle with thin arrow pointing 45 degrees down-right)
            drawAngledNR(ctx, x, y, 45); 
        } else if (type === 'RBC') {
            // UNMASKED: BC R (< with zig-zag arrow pointing down-right)
            drawZigZagNR(ctx, x, y, true);
        } else if (type === 'LAC') {
            // UNMASKED: AC L (X with thick arrow pointing 135 degrees down-left)
            ctx.lineWidth = 4; // Thick arrow from image
            drawAngledNR(ctx, x, y, 135); 
        } else if (type === 'LBC') {
            // UNMASKED: BC L (> with zig-zag arrow pointing down-left)
            drawZigZagNR(ctx, x, y, false);
        }
    }

    function drawAngledNR(ctx, x, y, angle) {
        const rads = angle * Math.PI / 180;
        const len = 25;
        const endX = x + Math.cos(rads) * len;
        const endY = y + Math.sin(rads) * len;

        ctx.moveTo(x, y); ctx.lineTo(endX, endY);
        
        const h = 8;
        ctx.lineTo(endX - h * Math.cos(rads - Math.PI/6), endY - h * Math.sin(rads - Math.PI/6));
        ctx.moveTo(endX, endY);
        ctx.lineTo(endX - h * Math.cos(rads + Math.PI/6), endY - h * Math.sin(rads + Math.PI/6));
        ctx.stroke();
    }

    function drawZigZagNR(ctx, x, y, isRight) {
        const scale = isRight ? 1 : -1;
        const pts = [
            {x:0, y:0}, {x:5, y:8}, {x:-5, y:12}, {x:5, y:20} // Relative points for the zig-zag
        ];
        
        ctx.moveTo(x + pts[0].x * scale, y + pts[0].y);
        for(let i=1; i<pts.length; i++) {
            ctx.lineTo(x + pts[i].x * scale, y + pts[i].y);
        }
        ctx.stroke();
    }

    // Masked NR styles are not standard; I'll assume you just add the above arrow styles 
    // to the masked symbols. 
    // If you need unique arrows for masked, I would need a specific reference image for that.

    function downloadImage() {
        const link = document.createElement('a');
        link.download = `Audiogram_NR_Update_${new Date().getTime()}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    }
</script>
</body>
</html>
