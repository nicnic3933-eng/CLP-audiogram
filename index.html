<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audiogram Creator - Shortened NR Arrows</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .app-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.15); width: fit-content; }
        .input-wrapper { display: flex; gap: 30px; margin-bottom: 20px; }
        h3 { margin: 0 0 10px 0; font-size: 1.1rem; text-align: center; }
        .red-text { color: #d32f2f; }
        .blue-text { color: #1976d2; }
        table { border-collapse: collapse; background: #fff; }
        th, td { border: 1px solid #dee2e6; padding: 4px 8px; text-align: center; }
        th { background: #f8f9fa; font-size: 0.8rem; font-weight: 600; }
        input { width: 55px; padding: 6px; text-align: center; border: 1px solid #ccc; border-radius: 4px; font-weight: bold; }
        input:focus { border-color: #007bff; outline: none; background: #f0f7ff; }
        input:disabled { background: #f1f1f1; cursor: not-allowed; border-color: #eee; }
        .canvas-container { position: relative; border: 2px solid #333; line-height: 0; overflow: auto; max-width: 95vw; }
        canvas { background: #fff; display: block; }
        .toolbar { margin-top: 15px; display: flex; gap: 10px; justify-content: center; }
        button { padding: 10px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-save { background: #28a745; color: white; }
        .btn-reset { background: #6c757d; color: white; }
        .instructions { font-size: 0.85rem; color: #555; margin-top: 15px; background: #e9ecef; padding: 10px; border-radius: 6px; text-align: center; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="input-wrapper">
        <div>
            <h3 class="red-text">RIGHT EAR</h3>
            <table id="rightGrid">
                <thead><tr><th>Hz</th><th>AC</th><th>BC</th></tr></thead>
                <tbody id="rightBody"></tbody>
            </table>
        </div>
        <div>
            <h3 class="blue-text">LEFT EAR</h3>
            <table id="leftGrid">
                <thead><tr><th>Hz</th><th>AC</th><th>BC</th></tr></thead>
                <tbody id="leftBody"></tbody>
            </table>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="audioCanvas"></canvas>
    </div>

    <div class="instructions">
        <strong>Shortcuts:</strong> [Value]<b>m</b> = Masked | [Value]<b>n</b> = NR Arrow | [Value]<b>mn</b> = Masked NR
    </div>

    <div class="toolbar">
        <button class="btn-save" onclick="downloadImage()">Download PNG Report</button>
        <button class="btn-reset" onclick="location.reload()">Clear All Data</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('audioCanvas');
    const ctx = canvas.getContext('2d');

    const freqs = [250, 500, 1000, 2000, 3000, 4000, 6000, 8000];
    const bcAllowed = [500, 1000, 2000, 4000];

    const CAL = {
        R_X_START: 125, 
        L_X_START: 766, 
        X_STEP: 76.2,
        Y_ZERO: 57, 
        Y_STEP_10: 38.1
    };

    const FREQ_MAP = {
        250: 0, 500: 1, 1000: 2, 2000: 3, 3000: 3.61, 4000: 4, 6000: 4.61, 8000: 5
    };

    const bgImage = new Image();
    bgImage.src = 'template.png'; 
    
    bgImage.onload = () => {
        canvas.width = bgImage.naturalWidth;
        canvas.height = bgImage.naturalHeight;
        drawAll();
    };

    function initGrids() {
        const sides = { 'R': 'rightBody', 'L': 'leftBody' };
        for (let side in sides) {
            const tbody = document.getElementById(sides[side]);
            freqs.forEach(f => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${f}</strong></td>
                    <td><input type="text" data-f="${f}" data-t="${side}AC" class="in"></td>
                    <td><input type="text" data-f="${f}" data-t="${side}BC" class="in" ${!bcAllowed.includes(f) ? 'disabled' : ''}></td>
                `;
                tbody.appendChild(tr);
            });
        }
    }

    initGrids();
    document.querySelectorAll('.in').forEach(i => i.addEventListener('input', drawAll));

    function getCoords(type, freq, val) {
        const multiplier = FREQ_MAP[freq];
        const isLeft = type.startsWith('L');
        const startX = isLeft ? CAL.L_X_START : CAL.R_X_START;
        return {
            x: startX + (multiplier * CAL.X_STEP),
            y: CAL.Y_ZERO + (parseFloat(val) * (CAL.Y_STEP_10 / 10))
        };
    }

    function drawAll() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (bgImage.complete) ctx.drawImage(bgImage, 0, 0);

        const allInputs = Array.from(document.querySelectorAll('.in')).filter(i => i.value);

        ['RAC', 'LAC'].forEach(type => {
            const color = type.startsWith('R') ? 'red' : 'blue';
            const points = allInputs
                .filter(i => i.dataset.t === type && !i.value.toLowerCase().includes('n'))
                .map(i => ({...getCoords(type, i.dataset.f, i.value), f: parseInt(i.dataset.f)}))
                .sort((a, b) => a.f - b.f);

            if (points.length > 1) {
                ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 3; ctx.lineJoin = "round";
                ctx.moveTo(points[0].x, points[0].y);
                points.forEach(p => ctx.lineTo(p.x, p.y));
                ctx.stroke();
            }
        });

        allInputs.forEach(i => {
            const val = i.value.toLowerCase();
            const db = parseFloat(val);
            if (isNaN(db)) return;
            renderSymbol(i.dataset.t, getCoords(i.dataset.t, i.dataset.f, val), val);
        });
    }

    function renderSymbol(type, pos, val) {
        const {x, y} = pos;
        const isM = val.includes('m'), isN = val.includes('n');
        ctx.strokeStyle = type.startsWith('R') ? 'red' : 'blue';
        ctx.lineWidth = 3; ctx.lineCap = "round";
        ctx.beginPath();

        if (type === 'RAC') {
            isM ? (ctx.moveTo(x,y-9), ctx.lineTo(x-9,y+7), ctx.lineTo(x+9,y+7), ctx.closePath()) : ctx.arc(x,y,8,0,Math.PI*2);
        } else if (type === 'LAC') {
            isM ? ctx.rect(x-8,y-8,16,16) : (ctx.moveTo(x-8,y-8), ctx.lineTo(x+8,y+8), ctx.moveTo(x+8,y-8), ctx.lineTo(x-8,y+8));
        } else if (type === 'RBC') {
            isM ? (ctx.moveTo(x+9,y-9), ctx.lineTo(x,y-9), ctx.lineTo(x,y+9), ctx.lineTo(x+9,y+9)) : (ctx.moveTo(x+9,y-9), ctx.lineTo(x,y), ctx.lineTo(x+9,y+9));
        } else if (type === 'LBC') {
            isM ? (ctx.moveTo(x-9,y-9), ctx.lineTo(x,y-9), ctx.lineTo(x,y+9), ctx.lineTo(x-9,y+9)) : (ctx.moveTo(x-9,y-9), ctx.lineTo(x,y), ctx.lineTo(x-9,y+9));
        }
        ctx.stroke();

        if (isN) {
            drawArrow(x, y, type, isM);
        }
    }

    function drawArrow(x, y, type, isMasked) {
        let angle;
        let startOffsetX = 0;
        let startOffsetY = 0;
        let arrowLen = 25; // Default shaft length

        // Base angles
        if (type === 'RAC') angle = 45;
        else if (type === 'LAC') angle = 90;
        else if (type === 'RBC') angle = 135;
        else if (type === 'LBC') angle = 45;

        const rads = angle * Math.PI / 180;

        if (type.endsWith('BC')) {
            // BC: Start arrow from bottom of bracket
            startOffsetY = 9; 
        } else if (type.endsWith('AC') && isMasked) {
            // AC Masked: Shift start point out and reduce length by same amount
            const pushOut = 10;
            startOffsetX = Math.cos(rads) * pushOut;
            startOffsetY = Math.sin(rads) * pushOut;
            arrowLen -= pushOut; // Shorten the shaft
        }

        const startX = x + startOffsetX;
        const startY = y + startOffsetY;
        const endX = startX + Math.cos(rads) * arrowLen;
        const endY = startY + Math.sin(rads) * arrowLen;

        ctx.beginPath();
        ctx.lineWidth = 2.5;
        ctx.moveTo(startX, startY);
        ctx.lineTo(endX, endY);
        
        const h = 8; // Head size
        ctx.lineTo(endX - h * Math.cos(rads - Math.PI/6), endY - h * Math.sin(rads - Math.PI/6));
        ctx.moveTo(endX, endY);
        ctx.lineTo(endX - h * Math.cos(rads + Math.PI/6), endY - h * Math.sin(rads + Math.PI/6));
        ctx.stroke();
    }

    function downloadImage() {
        const link = document.createElement('a');
        link.download = `Audiogram_Report.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    }
</script>
</body>
</html>
